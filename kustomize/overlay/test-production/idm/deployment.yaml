apiVersion: apps/v1
kind: Deployment

metadata:
  name: idm
  namespace: forgerock

spec:
  replicas: 1

  strategy:
    type: RollingUpdate

  minReadySeconds: 30

  selector:
    matchLabels:
      app: idm

  template:
    metadata:
      labels:
        app: idm

    spec:
      serviceAccountName: forgerock-sa

      terminationGracePeriodSeconds: 120

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - idm
              topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: idm

      containers:
        - name: openidm

          resources:
            requests:
              cpu: "1"
              memory: 500Mi

            limits:
              cpu: 
              memory: 1Gi

      initContainers:
        - name: custom-vol-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

        - name: filesystem-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

        - name: truststore-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi
