# =====================================================================
# CROSS-NAMESPACE IMAGE PULL PERMISSION
# Allows workloads in 'pnguat' to pull images from 'pnguat'.
# Apply with: oc apply -f image-puller-binding.yaml
# =====================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pnguat-image-puller-binding
  namespace: pnguat # ◄ Target namespace where images reside
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: system:image-puller # ◄ OpenShift built-in role
  subjects:
  - kind: ServiceAccount
    name: pnguat-sa # ◄ Consumer account name
    namespace: pnguat # ◄ Consumer namespace