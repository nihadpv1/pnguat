apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ds-master-cert
  namespace: pnguat
spec:
  commonName: Master Key

  dnsNames:
    - "*.ds"

  duration: 175200h

  isCA: false

  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: pnguat-ca-issuer

  privateKey:
    algorithm: RSA
    encoding: PKCS1
    rotationPolicy: Never
    size: 2048

  secretName: ds-master-keypair

  secretTemplate:
    labels:
      app: ds

  subject:
    organizations:
      - ForgeRock.com

  usages:
    - server auth
    - client auth
