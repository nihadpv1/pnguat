apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pnguat-role
  namespace: pnguat
rules:
# Secrets: Read/write for TLS certs, keystore, credentials
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# ConfigMaps: Read for configuration profiles
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Pods: Read for health checks (secret-agent, amster)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Jobs: Create/manage for keystore creation, backups
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Deployments: Read for rollout status
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
# Services: Read for ingress configuration
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# Routes: Read for OpenShift-specific ingress (optional)
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch"]
