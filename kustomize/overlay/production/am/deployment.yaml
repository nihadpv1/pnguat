apiVersion: apps/v1
kind: Deployment

metadata:
  name: am
  namespace: forgerock

spec:
  replicas: 3

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: am

  template:
    metadata:
      labels:
        app: am

    spec:
      serviceAccountName: forgerock-sa

      terminationGracePeriodSeconds: 120

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - am
              topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: am

      containers:
        - name: openam

          resources:
            requests:
              cpu: "1"
              memory: 4Gi

            limits:
              cpu: "2"
              memory: 6Gi

      initContainers:
        - name: custom-vol-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

        - name: filesystem-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

        - name: truststore-init

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi
